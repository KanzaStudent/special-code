<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --gold: #c8935a;
    --gold-light: #e8b87a;
    --cream: #f5e6d0;
    --bg: #100b0a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  canvas#bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 10;
    width: min(520px, 92vw);
    text-align: center;
    padding: clamp(32px, 6vw, 56px) clamp(16px, 4vw, 32px);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .label {
    font-size: clamp(9px, 2.5vw, 11px);
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 14px;
    animation: fadeUp 1s 0.3s both;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 3.4rem);
    font-weight: 700;
    color: var(--cream);
    line-height: 1.05;
    margin-bottom: 6px;
    animation: fadeUp 1s 0.45s both;
    word-break: break-word;
  }

  .hbd {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(0.9rem, 3.5vw, 1.25rem);
    color: var(--gold);
    margin-bottom: clamp(28px, 6vw, 44px);
    animation: fadeUp 1s 0.6s both;
  }

  #cakeWrap {
    margin: 0 auto clamp(24px, 5vw, 40px);
    animation: fadeUp 1s 0.75s both;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #cakeSvg {
    width: clamp(150px, 42vw, 200px);
    height: auto;
    overflow: visible;
  }

  #blowBtn {
    display: inline-block;
    padding: clamp(7px, 2vw, 9px) clamp(18px, 5vw, 26px);
    background: transparent;
    border: 1px solid rgba(200,147,90,0.45);
    color: var(--gold);
    border-radius: 40px;
    font-size: clamp(10px, 2.5vw, 12px);
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.3s, opacity 0.3s;
    white-space: nowrap;
  }
  #blowBtn:hover { background: rgba(200,147,90,0.1); }
  #blowBtn.blown { opacity: 0.35; pointer-events: none; }

  .divider {
    width: 40px;
    height: 1px;
    background: rgba(200,147,90,0.35);
    margin: 0 auto clamp(20px, 4vw, 28px);
    animation: fadeUp 1s 0.9s both;
  }

  .message {
    font-size: clamp(0.82rem, 3vw, 0.93rem);
    line-height: 1.9;
    color: rgba(245,230,208,0.65);
    font-weight: 300;
    white-space: pre-line;
    animation: fadeUp 1s 1s both;
    max-width: 100%;
  }

  .footer {
    margin-top: clamp(24px, 5vw, 36px);
    font-size: clamp(10px, 2.5vw, 12px);
    letter-spacing: 2px;
    color: rgba(200,147,90,0.4);
    animation: fadeUp 1s 1.1s both;
  }

  #wishText {
    display: none;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 3vw, 1rem);
    color: var(--gold-light);
    margin-top: 4px;
    animation: fadeUp 0.6s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="page">
  <div class="label">a very special day</div>
  <div class="name">Kamu</div>
  <div class="hbd">Happy Birthday</div>

  <div id="cakeWrap">
    <svg id="cakeSvg" width="200" height="220" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg"></svg>
    <button id="blowBtn">🕯️ Tiup Lilin</button>
    <div id="wishText">✨ Selamat Ulang Tahun! ✨</div>
  </div>

  <div class="divider"></div>

  <div class="message">Dont forget to smile

Semoga setiap hari jadi hari
yang paling indah untukmu</div>

  <div class="footer">— with love</div>
</div>

<script>
const svg = document.getElementById('cakeSvg');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

const colors = {
  bottom:       '#3d1f0f',
  bottomLight:  '#5a2e15',
  mid:          '#4a2412',
  midLight:     '#6b3519',
  top:          '#5c2d14',
  topLight:     '#7d4020',
  frosting:     '#e8c99a',
};

const candleData = [
  { x: 82, color: '#d4856a' },
  { x: 100, color: '#c8935a' },
  { x: 118, color: '#b87d8a' },
];

function drawCake() {
  svg.innerHTML = '';

  svg.appendChild(el('ellipse', { cx:100, cy:198, rx:78, ry:9, fill:'#1a0c05', opacity:'0.55' }));

  svg.appendChild(el('rect',    { x:28,  y:148, width:144, height:48, rx:5, fill:colors.bottom }));
  svg.appendChild(el('ellipse', { cx:100, cy:196, rx:72, ry:7, fill:'#1e0b04' }));
  svg.appendChild(el('ellipse', { cx:100, cy:148, rx:72, ry:8, fill:colors.bottomLight }));
  for (let i = 0; i < 8; i++) {
    const xp = 38 + i * 16;
    svg.appendChild(el('path', { d:`M${xp},148 Q${xp+3},160 ${xp},166`, stroke:colors.frosting, 'stroke-width':'3', fill:'none', 'stroke-linecap':'round', opacity:'0.72' }));
  }

  svg.appendChild(el('rect',    { x:44,  y:104, width:112, height:48, rx:5, fill:colors.mid }));
  svg.appendChild(el('ellipse', { cx:100, cy:152, rx:56, ry:6, fill:'#280d05' }));
  svg.appendChild(el('ellipse', { cx:100, cy:104, rx:56, ry:7, fill:colors.midLight }));
  for (let i = 0; i < 6; i++) {
    const xp = 52 + i * 16;
    svg.appendChild(el('path', { d:`M${xp},104 Q${xp+3},115 ${xp},120`, stroke:colors.frosting, 'stroke-width':'2.5', fill:'none', 'stroke-linecap':'round', opacity:'0.65' }));
  }

  svg.appendChild(el('rect',    { x:62,  y:64, width:76, height:44, rx:5, fill:colors.top }));
  svg.appendChild(el('ellipse', { cx:100, cy:108, rx:38, ry:5.5, fill:'#2e0d07' }));
  svg.appendChild(el('ellipse', { cx:100, cy:64,  rx:38, ry:6,   fill:colors.topLight }));
  for (let i = 0; i < 4; i++) {
    const xp = 70 + i * 16;
    svg.appendChild(el('path', { d:`M${xp},64 Q${xp+3},73 ${xp},79`, stroke:colors.frosting, 'stroke-width':'2', fill:'none', 'stroke-linecap':'round', opacity:'0.6' }));
  }

  candleData.forEach(c => {
    svg.appendChild(el('rect',    { x:c.x-4, y:38, width:8, height:28, rx:2, fill:c.color }));
    svg.appendChild(el('rect',    { x:c.x-4, y:62, width:8, height:4,  rx:1, fill:'rgba(0,0,0,0.2)' }));
    svg.appendChild(el('ellipse', { cx:c.x,  cy:38, rx:4, ry:2, fill:'#fff', opacity:'0.2' }));
  });

  // ── Flames (drawn on top)
  drawFlames();
}

let flameGroup = null;
let flameAnim  = null;
let blown      = false;

function drawFlames() {
  if (flameGroup) flameGroup.remove();
  flameGroup = el('g', { id: 'flames' });

  candleData.forEach((c, i) => {
    const glow = el('ellipse', { cx:c.x, cy:32, rx:6, ry:8,   fill:'#ff6b2b', opacity:'0.3',  id:`glow${i}` });
    const flame= el('ellipse', { cx:c.x, cy:33, rx:3.5, ry:5, fill:'#ffb347', opacity:'0.95', id:`flame${i}` });
    const tip  = el('ellipse', { cx:c.x, cy:29, rx:1.5, ry:2, fill:'#fff7d0', opacity:'0.7',  id:`tip${i}` });
    flameGroup.appendChild(glow);
    flameGroup.appendChild(flame);
    flameGroup.appendChild(tip);
  });

  svg.appendChild(flameGroup);
  animateFlames();
}

function animateFlames() {
  cancelAnimationFrame(flameAnim);
  let t = 0;
  function step() {
    if (blown) return;
    t += 0.08;
    candleData.forEach((_, i) => {
      const flame = document.getElementById(`flame${i}`);
      const glow  = document.getElementById(`glow${i}`);
      const tip   = document.getElementById(`tip${i}`);
      if (!flame) return;
      const rx = 3 + Math.sin(t + i * 1.3) * 0.8;
      const ry = 4.5 + Math.cos(t * 1.2 + i) * 1;
      const cy = 33 + Math.sin(t + i * 0.9) * 0.7;
      flame.setAttribute('rx', rx.toFixed(2));
      flame.setAttribute('ry', ry.toFixed(2));
      flame.setAttribute('cy', cy.toFixed(2));
      if (tip) tip.setAttribute('cy', (cy - 4).toFixed(2));
      if (glow) glow.setAttribute('opacity', (0.2 + Math.sin(t * 1.5 + i) * 0.15).toFixed(2));
    });
    flameAnim = requestAnimationFrame(step);
  }
  step();
}

drawCake();

document.getElementById('blowBtn').addEventListener('click', () => {
  if (blown) return;
  blown = true;
  cancelAnimationFrame(flameAnim);

  let opacity = 1;
  const fade = setInterval(() => {
    opacity -= 0.09;
    if (flameGroup) flameGroup.style.opacity = Math.max(0, opacity);
    if (opacity <= 0) {
      clearInterval(fade);
      if (flameGroup) flameGroup.remove();
      launchSparks();
    }
  }, 28);

  const btn = document.getElementById('blowBtn');
  btn.classList.add('blown');
  btn.textContent = '🎉 Sudah ditiup!';

  const wishText = document.getElementById('wishText');
  wishText.style.display = 'block';
  addSmoke();
});

function addSmoke() {
  const smokeG = el('g', { id: 'smoke' });
  svg.appendChild(smokeG);
  candleData.forEach((c, i) => {
    let sy = 30, op = 0.5, sby = 0;
    const s = el('ellipse', { cx:c.x, cy:sy, rx:2, ry:2, fill:'#888', opacity:op });
    smokeG.appendChild(s);
    let frame = 0;
    function rise() {
      frame++;
      sy  -= 0.6;
      sby += 0.3;
      op  -= 0.012;
      s.setAttribute('cy', sy.toFixed(1));
      s.setAttribute('rx', (2 + frame * 0.07).toFixed(2));
      s.setAttribute('ry', (2 + frame * 0.07).toFixed(2));
      s.setAttribute('opacity', Math.max(0, op).toFixed(2));
      if (op > 0) requestAnimationFrame(rise);
      else s.remove();
    }
    setTimeout(() => rise(), i * 120);
  });
}

const sparks = [];

function launchSparks() {
  for (let i = 0; i < 28; i++) {
    setTimeout(() => sparks.push(new Spark()), i * 25);
  }
}

class Spark {
  constructor() {
    const wrap = document.getElementById('cakeWrap');
    const rect = wrap.getBoundingClientRect();
    this.x  = rect.left + rect.width / 2 + (Math.random() - 0.5) * 40;
    this.y  = rect.top  + 30;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.1;
    const spd   = 2.5 + Math.random() * 4.5;
    this.vx     = Math.cos(angle) * spd;
    this.vy     = Math.sin(angle) * spd;
    this.life   = 1;
    this.decay  = 0.022 + Math.random() * 0.02;
    this.size   = 1.5 + Math.random() * 2;
    this.color  = ['#ffb347','#ff9060','#ffd080','#e8c070','#ff7a50'][Math.floor(Math.random()*5)];
  }
  update() {
    this.x  += this.vx;
    this.y  += this.vy;
    this.vy += 0.1;
    this.vx *= 0.97;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

const bgCanvas = document.getElementById('bg');
const ctx = bgCanvas.getContext('2d');
let W, H;

function resize() {
  W = bgCanvas.width  = window.innerWidth;
  H = bgCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const embers = [];

class Ember {
  constructor(init = false) {
    this.x     = Math.random() * (typeof W !== 'undefined' ? W : window.innerWidth);
    this.y     = init ? Math.random() * (typeof H !== 'undefined' ? H : window.innerHeight)
                      : (typeof H !== 'undefined' ? H : window.innerHeight) + 10;
    this.size  = Math.random() * 1.5 + 0.4;
    this.speed = Math.random() * 0.55 + 0.2;
    this.drift = (Math.random() - 0.5) * 0.3;
    this.life  = 1;
    this.decay = Math.random() * 0.004 + 0.001;
    this.color = Math.random() > 0.5 ? '#c8835a' : '#e8a060';
  }
  update() {
    this.y -= this.speed;
    this.x += this.drift + Math.sin(this.y * 0.02) * 0.3;
    this.life -= this.decay;
    if (this.life <= 0 || this.y < -10) {
      this.x     = Math.random() * W;
      this.y     = H + 10;
      this.life  = 1;
      this.decay = Math.random() * 0.004 + 0.001;
      this.speed = Math.random() * 0.55 + 0.2;
    }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.life * 0.5;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

for (let i = 0; i < 65; i++) embers.push(new Ember(true));

function loop() {
  ctx.fillStyle = 'rgba(16,11,10,0.22)';
  ctx.fillRect(0, 0, W, H);

  embers.forEach(e => { e.update(); e.draw(); });

  for (let i = sparks.length - 1; i >= 0; i--) {
    sparks[i].update();
    sparks[i].draw(ctx);
    if (sparks[i].life <= 0) sparks.splice(i, 1);
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
